name: docs

# Build the docs site with Zensical (https://zensical.org — reads mkdocs.yml natively) and publish it to
# GitHub Pages on every push to main. Runs only when something that can affect the rendered docs changes:
# docstrings/sources, the example pages, or the docs/build config.
#
# Two-step build (see mkdocs.yml header): gen_ref_pages.py writes the API stub pages + nav (Zensical
# doesn't run the old gen-files/literate-nav plugins) and the llms.txt/llms-full.txt files (replaces
# mkdocs-llmstxt), then `zensical build` renders the site (its native mkdocstrings module pulls
# docstrings from src/ statically — no package or torch install needed).
on:
  push:
    branches: [main]
    paths:
      - 'src/**/*.py'
      - 'docs/**'
      - 'README.md'
      - 'mkdocs.yml'
      - 'pyproject.toml'
  workflow_dispatch:   # allow manual re-publish from the Actions tab

# GitHub Pages deploy needs pages:write + id-token:write; contents:read to check out the repo.
permissions:
  contents: read
  pages: write
  id-token: write

# Never run two Pages deploys at once; let an in-flight deploy finish rather than cancelling it.
concurrency:
  group: docs-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install docs deps (just the PEP 735 docs group — griffe reads src/ statically, no package install)
        run: |
          python -m pip install --upgrade pip
          pip install --group docs

      - name: Generate API reference pages + nav + llms.txt
        run: python docs/gen_ref_pages.py

      - name: Build site
        run: zensical build --clean --strict

      - uses: actions/upload-pages-artifact@v5
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
