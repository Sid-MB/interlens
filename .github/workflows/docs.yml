name: Documentation

# Build the Zensical site and publish it to GitHub Pages on every push to main. Runs only when something that can
# affect the rendered docs changes: docstrings/sources, the example pages, or the docs/build config.
on:
  push:
    branches: [main]
    paths:
      - 'src/**/*.py'
      - 'docs/**'
      - 'scripts/docs/**'
      - 'README.md'
      - 'mkdocs.yml'
      - 'pyproject.toml'
  workflow_dispatch:   # allow manual re-publish from the Actions tab

# GitHub Pages deploy needs pages:write + id-token:write; contents:read to check out the repo.
permissions:
  contents: read
  pages: write
  id-token: write

# Never run two Pages deploys at once; let an in-flight deploy finish rather than cancelling it.
concurrency:
  group: docs-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0   # tags available so hatch-vcs can resolve a version during the editable install

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: actions/configure-pages@v6

      - name: Install docs deps (CPU torch keeps it light; mkdocstrings imports the package to read signatures)
        run: |
          python -m pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -e ".[docs]"

      - name: Build site
        run: python scripts/docs/build.py build

      - uses: actions/upload-pages-artifact@v5
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
