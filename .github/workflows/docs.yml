name: docs

# DISABLED — docs are deployed by Vercel now (see vercel.ts: Vercel builds on every push, with per-branch
# preview URLs and production on main), so this workflow no longer auto-runs. It is kept as a manual
# fallback: trigger it from the Actions tab to re-publish the site to GitHub Pages if Vercel is ever
# unavailable. To fully re-enable, restore the old push trigger:
#   on:
#     push:
#       branches: [main]
#       paths: ['src/**/*.py', 'docs/**', 'scripts/**', 'README.md', 'mkdocs.yml', 'pyproject.toml']
#
# Two-step build (see mkdocs.yml header): gen_ref_pages.py writes the API stub pages + nav (Zensical
# doesn't run the old gen-files/literate-nav plugins) and the llms.txt/llms-full.txt files (replaces
# mkdocs-llmstxt), then `zensical build` renders the site (its native mkdocstrings module pulls
# docstrings from src/ statically — no package or torch install needed).
on:
  workflow_dispatch:   # manual-only: docs deploys moved to Vercel

# GitHub Pages deploy needs pages:write + id-token:write; contents:read to check out the repo.
permissions:
  contents: read
  pages: write
  id-token: write

# Never run two Pages deploys at once; let an in-flight deploy finish rather than cancelling it.
concurrency:
  group: docs-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install docs deps (just the PEP 735 docs group — griffe reads src/ statically, no package install)
        run: |
          python -m pip install --upgrade pip
          pip install --group docs

      - name: Generate API reference pages + nav + llms.txt
        run: python scripts/gen_ref_pages.py

      - name: Build site
        run: zensical build --clean --strict

      - uses: actions/upload-pages-artifact@v5
        with:
          # mkdocs.yml renders straight into site/ (the site lives at the interlens.sidmb.com root now);
          # note GitHub Pages serves this repo under /interlens, so relative links may break on the fallback.
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
