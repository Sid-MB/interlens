name: publish

# Every push to main cuts a new release: bump the patch version, create+push a `vX.Y.Z` tag (the version is
# derived from it via hatch-vcs), build, publish to PyPI via Trusted Publishing (OIDC — no token), and cut a
# GitHub Release. The tag is the source of truth; nothing is committed back, so there's no bump-loop.
#
# One-time PyPI setup (https://pypi.org/manage/account/publishing/): add a pending publisher for
#   project: interlens · owner: Sid-MB · repo: interlens · workflow: publish.yml · environment: pypi
on:
  push:
    branches: [main]
    # Only cut a release when the shipped package actually changes — code under src/ or packaging metadata.
    # Docs/CI/test-only pushes don't bump the version or republish.
    paths:
      - 'src/**'
      - 'pyproject.toml'

# Serialize releases so two quick pushes can't race to claim the same version.
concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: write      # create + push the tag and the GitHub Release
      id-token: write      # PyPI Trusted Publishing (OIDC) + provenance signing
      attestations: write  # actions/attest-build-provenance
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0   # full history + tags so hatch-vcs / the bump can see the latest tag

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      # Gate the release on the AGPLv3 file headers: no tag, build, or publish happens unless every source
      # file carries the header (same check devs run locally via the insert-license pre-commit hook).
      # Config lives in .licenserc.yaml; runs here rather than in a separate workflow to save machine time.
      - name: Check AGPLv3 license headers
        uses: apache/skywalking-eyes/header@v0.8.0
        with:
          mode: check

      - name: Compute next version and tag it
        id: bump
        run: |
          git fetch --tags --force
          latest=$(git tag --list 'v*' --sort=-v:refname | head -n1)
          if [ -z "$latest" ]; then
            next="0.1.0"
          else
            v=${latest#v}; IFS=. read -r a b c <<<"$v"; next="$a.$b.$((c + 1))"
          fi
          echo "version=$next" >> "$GITHUB_OUTPUT"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "v$next"
          git push origin "v$next"

      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build

      # GitHub-native SLSA provenance for the built artifacts (verify later with `gh attestation verify <file>`).
      - name: Attest build provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: "dist/*"

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          attestations: true   # upload PEP 740 attestations to PyPI (default under Trusted Publishing; explicit here)

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "v${{ steps.bump.outputs.version }}" dist/* --generate-notes
