name: publish

# Publishes to PyPI via Trusted Publishing (OIDC) — no API token / password stored.
# Fires when a GitHub Release is published (create a release off a version tag, e.g. v0.1.0).
#
# One-time PyPI setup (https://pypi.org/manage/account/publishing/): add a "pending publisher" for
#   project: interlens · owner: Sid-MB · repo: interlens · workflow: publish.yml · environment: pypi
on:
  release:
    types: [published]

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment: pypi          # scope the OIDC identity to a protected env (recommended)
    permissions:
      id-token: write          # required for Trusted Publishing (OIDC)
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
