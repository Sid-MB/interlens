name: publish

# Every push to main cuts a new release: auto-fix any missing AGPLv3 license headers (committed back to
# main), bump the patch version, create+push a `vX.Y.Z` tag (the version is derived from it via hatch-vcs),
# build, publish to PyPI via Trusted Publishing (OIDC — no token), and cut a GitHub Release. The tag is the
# source of truth. The header-fix commit can't cause a release loop: pushes made with the workflow's
# GITHUB_TOKEN never trigger new workflow runs, and nothing else is committed back.
#
# One-time PyPI setup (https://pypi.org/manage/account/publishing/): add a pending publisher for
#   project: interlens · owner: Sid-MB · repo: interlens · workflow: publish.yml · environment: pypi
on:
  push:
    branches: [main]
    # Only cut a release when the shipped package actually changes — code under src/ or packaging metadata.
    # Docs/CI/test-only pushes don't bump the version or republish.
    paths:
      - 'src/**'
      - 'pyproject.toml'

# Serialize releases so two quick pushes can't race to claim the same version.
concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: write      # create + push the tag and the GitHub Release
      id-token: write      # PyPI Trusted Publishing (OIDC) + provenance signing
      attestations: write  # actions/attest-build-provenance
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0   # full history + tags so hatch-vcs / the bump can see the latest tag

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      # Auto-fix missing AGPLv3 file headers instead of failing the release. Deliberately runs the SAME
      # insert-license pre-commit hook devs use locally (see .pre-commit-config.yaml) rather than
      # License-Eye's fix mode, so CI and local hooks write byte-identical headers and can never fight
      # over formatting. The hook exits non-zero when it modifies files — the commit step below picks the
      # changes up, and the License-Eye gate re-verifies, so a real hook failure still stops the release.
      - name: Fix missing license headers (same insert-license hook as local pre-commit)
        run: |
          python -m pip install --upgrade pre-commit
          pre-commit run --all-files || true

      # Push any fixed headers back to the branch that triggered the run before tagging, so the tag (and
      # the sdist/wheel built from this checkout) always points at a fully-headered tree.
      - name: Commit fixed headers back to the triggering branch
        run: |
          if ! git diff --quiet; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git commit -am "Add missing AGPLv3 license headers [auto]"
            git push origin "HEAD:${{ github.ref_name }}"
          fi

      # Gate the release on the AGPLv3 file headers: no tag, build, or publish happens unless every source
      # file now carries the header. Config lives in .licenserc.yaml; its paths mirror the pre-commit
      # hook's `files` patterns — keep the two in sync.
      - name: Check AGPLv3 license headers
        uses: apache/skywalking-eyes/header@v0.8.0
        with:
          mode: check

      - name: Compute next version and tag it
        id: bump
        run: |
          git fetch --tags --force
          latest=$(git tag --list 'v*' --sort=-v:refname | head -n1)
          if [ -z "$latest" ]; then
            next="0.1.0"
          else
            v=${latest#v}; IFS=. read -r a b c <<<"$v"; next="$a.$b.$((c + 1))"
          fi
          echo "version=$next" >> "$GITHUB_OUTPUT"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "v$next"
          git push origin "v$next"

      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build

      # GitHub-native SLSA provenance for the built artifacts (verify later with `gh attestation verify <file>`).
      - name: Attest build provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: "dist/*"

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          attestations: true   # upload PEP 740 attestations to PyPI (default under Trusted Publishing; explicit here)

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "v${{ steps.bump.outputs.version }}" dist/* --generate-notes
