name: tests

on:
  # Only run when something that can affect test outcomes changes: Python sources/tests or packaging metadata.
  # Docs/CI-only changes skip the suite. Keep the same filter on both triggers so pushes and PRs behave alike.
  push:
    branches: [main]
    paths:
      - '**/*.py'
      - 'pyproject.toml'
      - 'uv.lock'
  pull_request:
    paths:
      - '**/*.py'
      - 'pyproject.toml'
      - 'uv.lock'

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quick-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0   # tags available so hatch-vcs can resolve a version during the editable install

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install (CPU torch + package + dev deps)
        run: |
          python -m pip install --upgrade pip
          # CPU torch keeps CI light — the quick tests never touch a GPU or download model weights.
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -e . --group dev

      - name: Run quick tests
        run: pytest -m "not slow" -q
