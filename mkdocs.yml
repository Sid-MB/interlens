# Site config for interlens, built with Zensical (reads mkdocs.yml natively — no separate config needed).
#
# Design: the site is built from THREE sources with zero content duplication —
#   1. `docs/index.md`      → snippet-includes the top-level README (single source of truth for the intro).
#   2. `docs/examples/*.md` → the existing hand-written simple→advanced walkthrough, reused verbatim.
#   3. `docs/reference/**`  → API stub pages (gitignored) written by `docs/gen_ref_pages.py`, one `:::`
#                             directive per module, rendered by Zensical's native mkdocstrings module. The
#                             script also splices the nav tree between the markers below — run it before
#                             every build/serve. No manual upkeep as the public API grows.
# The script also invokes `docs/gen_llms_txt.py`, which emits `llms.txt` (index) and `llms-full.txt`
# (concatenated bodies) into `docs/` — Zensical copies them verbatim to the site root — replacing the
# mkdocs-llmstxt plugin, which Zensical doesn't run.
#
# Build: python docs/gen_ref_pages.py && zensical build --clean
# Serve: python docs/gen_ref_pages.py && zensical serve
site_name: interlens
site_description: A framework for scaffolding and interpreting multi-agent conversations (activation capture, steering, patching).
# site_url is the single source of truth for the published URL — gen_llms_txt.py reads it from here, and
# Zensical derives canonical links + sitemap entries from it. The site lives under the /interlens subpath
# of docs.sidmb.com, so site_dir nests the output accordingly (vercel.ts serves `site/` at the domain root
# and redirects / → /interlens/).
site_url: https://interlens.docs.sidmb.com/
site_dir: site/interlens
repo_url: https://github.com/Sid-MB/interlens
repo_name: Sid-MB/interlens
edit_uri: edit/main/

theme:
  name: material
  features:
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - content.code.copy
    - content.action.edit
    - search.suggest
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle: { icon: material/weather-night, name: Switch to dark mode }
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle: { icon: material/weather-sunny, name: Switch to light mode }

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google        # Args:/Returns:/Raises: sections; plain paragraphs pass through as Markdown.
            docstring_section_style: table
            merge_init_into_class: true
            show_root_heading: true
            show_signature_annotations: true
            separate_signature: true
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            filters: ["!^_"]                # hide private members (leading underscore), keep dunder-free public API.

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight: { anchor_linenums: true }
  - pymdownx.snippets: { base_path: ["."], check_paths: true }
  - toc: { permalink: true }

nav:
  - Home: index.md
  - Examples:
      - examples/README.md
      - Quickstart: examples/01_quickstart.md
      - Conversations: examples/02_conversations.md
      - Participants & models: examples/03_participants_and_models.md
      - Context & serialization: examples/04_context_and_serialization.md
      - Tools: examples/05_tools.md
      - Hooks: examples/06_hooks.md
      - Interpretability: examples/07_interp.md
      - Rollouts & scale: examples/08_rollouts_and_scale.md
      - Advanced interp pipelines: examples/09_advanced_interp_pipelines.md
  - API reference:
      # BEGIN generated reference nav — run docs/gen_ref_pages.py to refresh; do not edit by hand
      - interlens:
          - reference/interlens/index.md
          - context:
              - reference/interlens/context/index.md
              - context_policy: reference/interlens/context/context_policy.md
              - drop_oldest_policy: reference/interlens/context/drop_oldest_policy.md
