          - context_item: reference/interlens/context_item.md
          - conversation: reference/interlens/conversation.md
          - execution_mode: reference/interlens/execution_mode.md
          - factories: reference/interlens/factories.md
          - functional: reference/interlens/functional.md
          - hooks:
