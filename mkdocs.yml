# Zensical site config for interlens. Zensical recommends retaining `mkdocs.yml` while migrating existing projects.
#
# Design: the site is built from THREE sources with zero content duplication —
#   1. `docs/index.md`      → snippet-includes the top-level README (single source of truth for the intro).
#   2. `docs/examples/*.md` → the existing hand-written simple→advanced walkthrough, reused verbatim.
#   3. `docs/reference/**` → `scripts/docs/build.py` generates a gitignored module tree that mkdocstrings renders from source docstrings.
# No explicit `nav` is defined because Zensical derives the module-shaped sidebar from the generated directory hierarchy.
# `scripts/docs/build.py` generates gitignored `llms.txt` and `llms-full.txt` source assets before Zensical serves or builds the site.
site_name: interlens
site_description: A framework for scaffolding and interpreting multi-agent conversations (activation capture, steering, patching).
site_url: https://sid-mb.github.io/interlens/
repo_url: https://github.com/Sid-MB/interlens
repo_name: Sid-MB/interlens
edit_uri: edit/main/

theme:
  name: material
  features:
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - content.code.copy
    - content.action.edit
    - search.suggest
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle: { icon: material/weather-night, name: Switch to dark mode }
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle: { icon: material/weather-sunny, name: Switch to light mode }

plugins:
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google        # Args:/Returns:/Raises: sections; plain paragraphs pass through as Markdown.
            docstring_section_style: table
            merge_init_into_class: true
            show_root_heading: true
            show_signature_annotations: true
            separate_signature: true
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            filters: ["!^_"]                # hide private members (leading underscore), keep dunder-free public API.

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight: { anchor_linenums: true }
  - pymdownx.snippets: { base_path: ["."], check_paths: true }
  - toc: { permalink: true }
